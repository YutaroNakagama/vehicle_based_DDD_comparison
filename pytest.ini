[pytest]
# Pytest configuration for vehicle-based DDD comparison project

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Minimum Python version
minversion = 6.0

# Add src to the Python path
pythonpath = .

# Markers for categorizing tests
markers =
    fast: marks tests as fast (deselect with '-m "not fast"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    smoke: marks tests as smoke tests (quick end-to-end checks)
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    requires_data: marks tests that require actual dataset
    requires_gpu: marks tests that require GPU

# Output options
addopts =
    -ra
    --strict-markers
    --strict-config
    --showlocals
    --tb=short

# Coverage options (when --cov is used)
[coverage:run]
source = src
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
